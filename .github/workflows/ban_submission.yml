name: Ban Submission Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, 'Rookie Banlist Submission')

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate submission
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/validate_submission.py

      - name: Post validation summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            const nameMatch = body.match(/Player name[\s\S]*?```\s*\n(.+?)\n```/);
            const byMatch = body.match(/Submitted By[\s\S]*?```\s*\n(.+?)\n```/);
            const name = nameMatch ? nameMatch[1].trim() : "unknown";
            const by = byMatch ? byMatch[1].trim() : "unknown";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Ban submission validated.**\n\nPlayer \`${name}\` submitted by \`${by}\` is pending review.`,
            });
