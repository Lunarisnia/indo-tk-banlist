name: Ban Submission Check

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'ban:')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Append player to banlist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/validate_submission.py

      - name: Commit banlist update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/banlist.txt
          git commit -m "ban: add player from merged PR #${{ github.event.pull_request.number }}"
          git push

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            const nameMatch = body.match(/Player name[\s\S]*?```\s*\n(.+?)\n```/);
            const byMatch = body.match(/Submitted By[\s\S]*?```\s*\n(.+?)\n```/);
            const name = nameMatch ? nameMatch[1].trim() : "unknown";
            const by = byMatch ? byMatch[1].trim() : "unknown";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Ban submission validated.**\n\nPlayer \`${name}\` submitted by \`${by}\` is pending review.`,
            });

  deploy:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  deploy-2nd-time-cuz-race-conditions-and-i-am-lazy:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  deploy-2nd-time-cuz-race-conditions-and-i-am-lazy:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
